name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest test_ai_maintainer.py -v

      - uses: actions/upload-artifact@v4
        with:
          name: ai-maintainer
          path: ai-maintainer

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v4

      - name: Delete previous latest release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release delete latest --yes || true
          git push --delete origin refs/tags/latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: ai-maintainer
          path: artifacts

      - uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && 'latest' || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && 'latest' || github.ref_name }}
          body: ${{ github.ref == 'refs/heads/main' && 'Latest build from main branch' || '' }}
          files: artifacts/ai-maintainer
