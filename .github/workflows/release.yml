name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest test_ai_maintainer.py -v

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-maintainer
          path: ai-maintainer

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Delete previous dev release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release delete dev --yes || true
          git push --delete origin refs/tags/dev || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ai-maintainer
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && 'dev' || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && 'dev' || github.ref_name }}
          body: ${{ github.ref == 'refs/heads/main' && 'Latest build from main branch' || '' }}
          make_latest: ${{ github.ref == 'refs/heads/main' && 'false' || 'true' }}
          files: artifacts/ai-maintainer
